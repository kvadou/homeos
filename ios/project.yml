name: HomeOS
options:
  bundleIdPrefix: com.homeos
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "19"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: FM45AMFBNY
    CODE_SIGN_STYLE: Automatic
targets:
  HomeOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HomeOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dougkvamme.homeos
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_NSCameraUsageDescription: "Scan receipts and documents for your home's records."
        INFOPLIST_KEY_CFBundleDisplayName: GatherRoot
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: Supabase
        product: Supabase
  # UI test bundle — the iOS pw-verify equivalent (headless screenshot sweep).
  HomeOSUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HomeOSUITests
    dependencies:
      - target: HomeOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dougkvamme.homeos.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_TARGET_NAME: HomeOS
        TARGETED_DEVICE_FAMILY: "1"
# shared scheme — required by Xcode Cloud (headless CI never auto-creates schemes)
schemes:
  HomeOS:
    build:
      targets:
        HomeOS: all
        HomeOSUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HomeOSUITests
    archive:
      config: Release
