<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    width: 1000px;
    height: 1400px;
    /* mimic a phone photo of an appliance: dark, slightly uneven backdrop */
    background: radial-gradient(circle at 40% 35%, #3a3d40 0%, #232527 55%, #17181a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Arial Narrow", Arial, sans-serif;
  }
  /* the riveted metal data plate */
  .plate {
    width: 640px;
    padding: 46px 40px;
    background: linear-gradient(155deg, #c7ccd1 0%, #9ea4aa 45%, #babfc4 100%);
    border: 3px solid #6c7075;
    border-radius: 10px;
    box-shadow: inset 0 2px 6px rgba(255,255,255,0.5), inset 0 -3px 8px rgba(0,0,0,0.4), 0 18px 40px rgba(0,0,0,0.55);
    position: relative;
  }
  .rivet { position: absolute; width: 16px; height: 16px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #eef0f2, #7a7e82 70%, #4b4e51);
  }
  .r1 { top: 14px; left: 14px; } .r2 { top: 14px; right: 14px; }
  .r3 { bottom: 14px; left: 14px; } .r4 { bottom: 14px; right: 14px; }
  .maker {
    text-align: center; font-size: 46px; font-weight: 800; letter-spacing: 8px;
    color: #2b2e31; text-shadow: 0 1px 0 rgba(255,255,255,0.6), 0 -1px 0 rgba(0,0,0,0.35);
    margin-bottom: 6px;
  }
  .type { text-align: center; font-size: 16px; letter-spacing: 3px; color: #40474e; margin-bottom: 26px; }
  .row { display: flex; font-size: 26px; color: #23262a; padding: 10px 6px; border-top: 1px solid rgba(80,84,88,0.5); }
  .row .lab { width: 44%; font-weight: 700; letter-spacing: 1px; }
  .row .val { width: 56%; font-family: "Courier New", monospace; font-weight: 700; letter-spacing: 1px; }
</style>
</head>
<body>
  <div class="plate">
    <span class="rivet r1"></span><span class="rivet r2"></span>
    <span class="rivet r3"></span><span class="rivet r4"></span>
    <div class="maker">LENNOX</div>
    <div class="type">GAS FURNACE — DATA PLATE</div>
    <div class="row"><span class="lab">MODEL</span><span class="val">ML195UH045XE36B</span></div>
    <div class="row"><span class="lab">SERIAL</span><span class="val">5919M04829</span></div>
    <div class="row"><span class="lab">INPUT</span><span class="val">88,000 BTU/HR</span></div>
  </div>
</body>
</html>
